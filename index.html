<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0%;
        }
        html{
            scroll-behavior: smooth;
        }
        .a{
            display: flex;
            position: fixed;
            top: 0%;
            background-color: black;
            width: 100%;
            justify-content: space-around;
            align-items: center;
            font-weight: bolder;
            color: white;
            font-size: 20px;
            flex-wrap: wrap;
            border: white solid;
            border-width: 0px 0px 1px 0px ;
        }
        .a label{
            cursor: pointer;
        }
        .b{
            display: flex;
            width: 100%;
            background-color: #15050f;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            flex-direction: row;
            border: white solid;
            border-width: 0px 0px 1px 0px ;

            
        }
        #img1{
            width: 300px;   
            margin-top: 20px;     
        }
        @media (max-width:850px)
        {
            .a label{font-size: 15px;}
            .b #h1{font-size: 24px;}
            .b #p{font-size: 18px;}
            .c #c1{font-size: 18px;}
            .c #c2{font-size: 15px;}
            #img1{width: 200px;}
        }
        #h1{
            font-size: 40px;
            margin-top:30px;
        }
        
        .c{
            display: flex;
            width: 100%;
            background-color: #221210;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            flex-direction: column;
            border: white solid;
            border-width: 0px 0px 1px 0px ;
            color: white;
            
        }
        #c1{
            font-size: 30px;
            color: yellow;
            font-weight: bolder;
            margin-top: 10px;
            margin-bottom: 10px;

        }
        #c2{
            font-size: 20px;
            color: white;
            margin-right: 15px;
            margin-left: 15px;
            margin-bottom: 10px;


        }
    </style>
</head>

<body>
    <div class="a">
        <label >About</label>
        <label >Kinematics</label>
        <label >Operation</label>
        <label >Specifications</label>
    </div>

    <div class="b">
        <h1 id="h1" style="color: white;font-weight: bolder;">
            SCORA ER-14 ROBOT
        <p id="p" style="color: gray;">4-DOF Robotic Arm for Kinematics and Control</p>
        </h1>
        <img id="img1" src="scora.png"  alt="">
    </div>

    <div class="c">
        <label id="c1">Overview</label>
        <label id="c2">
            The SCORA ER-14 is a 4-degree-of-freedom (DOF) robotic arm designed for educational
            and industrial applications, particularly in kinematics, automation, and control system studies.
            It features a robust mechanical structure with precise joint articulation, enabling users to 
            perform forward and inverse kinematics calculations for motion planning. The robot is commonly
            used in research labs and training institutes to teach robotics concepts, programming, and 
            real-world automation techniques. Its compact design and compatibility with various control systems
            make it a versatile tool for learning and experimentation in robotic manipulation.
        </label>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded",()=>
    {
        let icons=document.querySelectorAll(".a label")
        icons[0].style.color="yellow"
        
        for(let i=0;i<icons.length;i++)
        {
            icons[i].addEventListener("click",()=>
            {
                for(let j=0;j<icons.length;j++)
                {
                    icons[j].style.color="white"
                }
                icons[i].style.color="yellow"
            })
        }
    }
    )
    </script>
</body>
</html>
