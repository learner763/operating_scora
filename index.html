<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0%;
        }
        html{
            scroll-behavior: smooth;
        }
        .a{
            display: flex;
            position: fixed;
            top: 0%;
            background-color: black;
            width: 100%;
            justify-content: space-around;
            align-items: center;
            font-weight: bolder;
            color: white;
            font-size: 20px;
            flex-wrap: wrap;
        }
        .a label{
            cursor: pointer;
        }
        .b{
            display: flex;
            width: 100%;
            background-color: #15050f;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            flex-direction: row;
            margin-top: 23px;

        }
        
    </style>
</head>

<body>
    <div class="a">
        <label >About</label>
        <label >Kinematics</label>
        <label >Operation</label>
        <label >Specifications</label>
    </div>
    <div class="b">
        <h1 style="font-size: 40px;color: white;font-weight: bolder;">
            SCORA ER-14 ROBOT
        <p style="font-size: 30px;color: gray;">4-DOF Robotic Arm for Kinematics and Control</p>
        </h1>
        <img src="scora.png" width="300px" alt="">
    </div>
    <script>
        document.addEventListener("DOMContentLoaded",()=>
    {
        let icons=document.querySelectorAll(".a label")
        icons[0].style.color="yellow"
        
        for(let i=0;i<icons.length;i++)
        {
            icons[i].addEventListener("click",()=>
            {
                for(let j=0;j<icons.length;j++)
                {
                    icons[j].style.color="white"
                }
                icons[i].style.color="yellow"
            })
        }
    }
    )
    </script>
</body>
</html>
